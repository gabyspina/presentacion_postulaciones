        <option>Bahía Blanca</option>
        <option>Buenos Aires Centro</option>
        <option>La Plata</option>

    <div class="filtro-grupo">
      <label>Tipo</label>
      <select id="fTipo" onchange="renderGestion()">
        <option value="">Todos</option>
        <option value="Nuevo">No existe en PD</option>
        <option value="Existente">Dado de alta en PD</option>
        <option value="Prestador">Prest. sin código</option>
        <option value="FueraMI">Prest. fuera de MI</option>

        <label>N° de socio</label>

];

var ultimoId = 11;
var GESTION_COLS = ['Fecha','Filial','Localidad','Nombre profesional','Especialidad','Datos','Estado','Asignado a','N° Postulación','Tipo','Observaciones','Ticket','Nombre socio','Nro socio','Medida judicial'];

// ================== NAVEGACIÓN ==================
function irA(p) {
  document.querySelectorAll('.pantalla').forEach(function(el){ el.classList.remove('visible'); });
  document.querySelectorAll('nav button').forEach(function(el){ el.classList.remove('activo'); });
  document.getElementById('pantalla-' + p).classList.add('visible');
  document.getElementById('nav-' + p).classList.add('activo');
  if (p === 'gestion') renderGestion();
  if (p === 'seguimiento') renderSeguimiento();
  if (p === 'contratados') renderContratados();
  if (p === 'nocontratados') renderNoContratados();
}

// ================== TOAST ==================
function aviso(msj, tipo) {
  var t = document.getElementById('toast');
  t.innerText = msj;
  t.className = 'toast-' + (tipo || 'error');
  t.style.display = 'block';
  void t.offsetWidth;
  t.classList.add('visible');
  clearTimeout(window._tt);
  window._tt = setTimeout(function(){ t.classList.remove('visible'); setTimeout(function(){ t.style.display='none'; },300); }, 3200);
}

// ================== GESTIÓN ==================
function tipoDisplay(t) {
  return { 'Nuevo':'No en PD', 'Existente':'En PD', 'Prestador':'Prest. sin código', 'FueraMI':'Prest. fuera de MI' }[t] || t;
}

function renderGestion() {
  var fil = document.getElementById('fFilial').value;
  var tip = document.getElementById('fTipo').value;
  var est = document.getElementById('fEstado').value;
  var bus = document.getElementById('fBuscar').value.toLowerCase();

  var datos = registros.filter(function(r) {
    return r.estado !== 'Contratado' && r.estado !== 'No contratado'
      && (!fil || r.filial === fil)
      && (!tip || r.tipo === tip)
      && (!est || r.estado === est)
      && (!bus || r.nombre.toLowerCase().includes(bus));
  });

  document.getElementById('contadorGestion').innerText = datos.length + ' postulación/es activas';

  var h = '<div class="tabla-wrapper"><table><thead><tr>';
  GESTION_COLS.forEach(function(c){ h += '<th>' + c + '</th>'; });
  h += '</tr></thead><tbody>';

  datos.forEach(function(r) {
    var cls = '';
    if (r.tipo === 'Nuevo') cls = 'fila-nuevo';
    else if (r.tipo === 'Prestador' || r.tipo === 'FueraMI') cls = 'fila-verde';
    h += '<tr' + (cls ? ' class="'+cls+'"' : '') + '>';
    h += '<td>' + r.fecha + '</td><td>' + r.filial + '</td><td>' + r.ciudad + '</td>';
    h += '<td><strong>' + r.nombre + '</strong></td><td>' + r.esp + '</td>';
    h += '<td><button class="btn-contacto" onclick="verContacto(' + r.id + ')">📋 Ver</button></td>';
    // Estado editable
    h += '<td><div style="display:flex;gap:4px;align-items:center;">'
       + '<select id="est-' + r.id + '" class="select-estado ' + (CLS[r.estado]||'propuesto') + '" '
       + 'onchange="this.className=\'select-estado \'+CLS[this.value]">'
       + ESTADOS.map(function(e){ return '<option' + (e===r.estado?' selected':'') + '>' + e + '</option>'; }).join('')
       + '</select><button class="btn-confirmar" onclick="confEstado(' + r.id + ')">✓</button></div></td>';
    // Asignado
    h += '<td><div style="display:flex;gap:4px;align-items:center;">'
       + '<select id="asig-' + r.id + '" class="select-asignado"><option value="">Sin asignar</option>'
       + EQUIPO.map(function(u){ return '<option' + (u===r.asignado?' selected':'') + '>' + u + '</option>'; }).join('')
       + '</select><button class="btn-confirmar" onclick="confAsignado(' + r.id + ')">✓</button></div></td>';
    // Nro post
    if (r.estado === 'Postulado' && !r.nroPost) {
      h += '<td><div style="display:flex;gap:4px;align-items:center;">'
         + '<input type="number" class="input-nropost" id="np-' + r.id + '" placeholder="N° postulación">'
         + '<button class="btn-confirmar" onclick="confNroPost(' + r.id + ')">✓</button></div></td>';
    } else {
      h += '<td>' + (r.nroPost ? '<strong>' + r.nroPost + '</strong>' : '<span style="color:#aaa">—</span>') + '</td>';
    }
    h += '<td>' + tipoDisplay(r.tipo) + '</td>';
    h += '<td><button class="btn-obs" onclick="verObs(' + r.id + ')">💬 ' + r.obs.length + '</button></td>';
    h += '<td>' + r.ticket + '</td><td>' + r.socio + '</td><td>' + r.nroSocio + '</td><td>' + r.medida + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('tablaGestion').innerHTML = h;
}

function limpiarFiltros() {
  document.getElementById('fFilial').value = '';
  document.getElementById('fTipo').value = '';
  document.getElementById('fEstado').value = '';
  document.getElementById('fBuscar').value = '';
  renderGestion();
}

function buscar(id) { return registros.find(function(r){ return r.id === id; }); }

function confEstado(id) {
  var r = buscar(id);
  var sel = document.getElementById('est-' + id);
  var nuevo = sel.value;

  if (nuevo !== 'Propuesto' && !r.asignado) {
    aviso('⚠️ Primero tenés que asignar este profesional a alguien antes de cambiar el estado.');
    sel.value = r.estado; sel.className = 'select-estado ' + (CLS[r.estado]||'propuesto');
    return;
  }
  var posteriores = ['Pendiente de Experiencia','Contratado','No contratado'];
  if (r.estado === 'Postulado' && posteriores.indexOf(nuevo) !== -1 && !r.nroPost) {
    aviso('⚠️ Tenés que cargar el N° de postulación antes de avanzar a este estado.');
    sel.value = 'Postulado'; sel.className = 'select-estado postulado';
    return;
  }
  r.estado = nuevo;
  if (nuevo === 'Contratado') r.fechaContr = '10/06/2026';
  aviso('✅ Estado actualizado a "' + nuevo + '"', 'exito');
  renderGestion();
}

function confAsignado(id) {
  var r = buscar(id);
  var nombre = document.getElementById('asig-' + id).value;
  r.asignado = nombre;
  if (nombre && r.estado === 'Propuesto') r.estado = 'Asignado';
  aviso(nombre ? '✅ Asignado a ' + nombre : '✅ Asignación quitada', 'exito');
  renderGestion();
}

function confNroPost(id) {
  var r = buscar(id);
  var v = document.getElementById('np-' + id).value.trim();
  if (!v) { aviso('Ingresá un número de postulación.'); return; }
  r.nroPost = v;
  aviso('✅ N° de postulación guardado: ' + v, 'exito');
  renderGestion();
}

function verContacto(id) {
  var r = buscar(id);
  document.getElementById('mcNombre').innerText = r.nombre;
  document.getElementById('mcTel').innerText = r.tel;
  document.getElementById('mcMail').innerText = r.mail;
  document.getElementById('mcCuit').innerText = r.cuit;
  document.getElementById('modalContacto').classList.add('activo');
}

var obsActual = -1;
function verObs(id) {
  obsActual = id;
  var r = buscar(id);
  document.getElementById('moNombre').innerText = r.nombre;
  document.getElementById('moLog').innerHTML = r.obs.length === 0
    ? '<p style="color:#aaa;font-size:13px;">Sin observaciones aún.</p>'
    : r.obs.map(function(o){ return '<div class="obs-entry"><div class="obs-meta">'+o.meta+'</div><div class="obs-texto">'+o.texto+'</div></div>'; }).join('');
  var ed = document.getElementById('moEditor');
  if (!r.asignado) {
    ed.innerHTML = '<p style="color:#c62828;font-size:13px;background:#fdecea;padding:10px 12px;border-radius:6px;">⚠️ Asigná este profesional a alguien para poder cargar observaciones.</p>';
  } else {
    ed.innerHTML = '<textarea class="obs-input" id="moInput" placeholder="Escribí una nueva observación..."></textarea>'
      + '<div style="display:flex;gap:8px;"><button class="btn-guardar-obs" onclick="guardarObs()">Guardar</button>'
      + '<button class="btn-cerrar" style="margin-top:0;" onclick="document.getElementById(\'modalObs\').classList.remove(\'activo\')">Cancelar</button></div>';
  }
  document.getElementById('modalObs').classList.add('activo');
}

function guardarObs() {
  var r = buscar(obsActual);
  var t = document.getElementById('moInput').value.trim();
  if (!t) return;
  var ahora = new Date();
  r.obs.push({ meta: ahora.toLocaleDateString('es-AR') + ' ' + ahora.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) + ' - usuario.demo@osde.com.ar - Asignado a: ' + r.asignado, texto: t });
  aviso('✅ Observación agregada', 'exito');
  verObs(obsActual);
  renderGestion();
}

// ================== SIMULACIÓN DE ALTA AUTOMÁTICA ==================
function simularAlta() {
  var candidato = registros.find(function(r){ return r.nroPost && r.estado !== 'Contratado' && r.estado !== 'No contratado'; });
  if (!candidato) { aviso('No hay postulaciones con N° cargado para simular el alta.', 'info'); return; }
  aviso('📧 Llegó mail: "Notificación de Alta de Prestador - ' + candidato.nroPost + '"', 'info');
  setTimeout(function() {
    candidato.estado = 'Contratado';
    candidato.fechaContr = '10/06/2026';
    renderGestion();
    aviso('⚡ Detección automática: ' + candidato.nombre + ' pasó a CONTRATADO sin intervención manual', 'exito');
  }, 2200);
}

// ================== CARGA ==================
function toggleTipo() {
  var t = document.getElementById('cTipo').value;
  var ocultar = (t === 'Prestador' || t === 'FueraMI');
  document.getElementById('grpCiudad').style.display   = ocultar ? 'none' : 'block';
  document.getElementById('grpContacto').style.display = ocultar ? 'none' : 'flex';
  document.getElementById('grpSocio').style.display    = ocultar ? 'none' : 'flex';
  document.getElementById('grpTicket').style.display   = ocultar ? 'none' : 'block';
  document.getElementById('grpNroProf').style.display  = (t === 'Existente') ? 'block' : 'none';
}

function cargarPropuesta() {
  var nombre = document.getElementById('cNombre').value.trim();
  var cuit   = document.getElementById('cCuit').value.trim();
  if (!nombre) { aviso('Ingresá el nombre del profesional.'); return; }
  if (!cuit)   { aviso('Ingresá el CUIT.'); return; }
  // Validación CUIT duplicado (simulada)
  var dup = registros.find(function(r){ return r.cuit === cuit; });
  if (dup) { aviso('⚠️ Ese CUIT ya fue cargado para ' + dup.nombre + '.'); return; }

  ultimoId++;
  registros.push({
    id: ultimoId,
    filial: document.getElementById('cFilial').value,
    ciudad: document.getElementById('cCiudad').value || '—',
    tipo: document.getElementById('cTipo').value,
    nombre: nombre.toUpperCase(),
    esp: document.getElementById('cEsp').value,
    tel: document.getElementById('cTel').value || '—',
    mail: document.getElementById('cMail').value || '—',
    fecha: '10/06/2026',
    nroSocio: document.getElementById('cNroSocio').value || '—',
    socio: document.getElementById('cSocio').value || '—',
    ticket: document.getElementById('cTicket').value || '—',
    medida: 'No', estado: 'Propuesto', asignado: '', nroPost: '', cuit: cuit, obs: [], fechaContr: ''
  });
  aviso('✅ Propuesta cargada correctamente. Ya está visible en Gestión.', 'exito');
  ['cNombre','cCuit','cCiudad','cTel','cMail','cSocio','cNroSocio','cTicket'].forEach(function(i){ document.getElementById(i).value = ''; });
}

// ================== SEGUIMIENTO ==================
function renderSeguimiento() {
  var datos = registros.filter(function(r){ return r.nroPost; });
  document.getElementById('contadorSeg').innerText = datos.length + ' postulación/es con número asignado';
  var h = '<div class="tabla-wrapper"><table class="naranja"><thead><tr><th>N° Postulación</th><th>Filial</th><th>Ciudad</th><th>Nombre</th><th>CUIT</th><th>Estado</th><th>Detalle</th></tr></thead><tbody>';
  datos.forEach(function(r) {
    var detalle = r.estado === 'Contratado' ? 'Alta finalizada' : (r.estado === 'No contratado' ? 'Postulación cerrada' : 'Pendiente de envío de carta de intención');
    h += '<tr><td><strong>' + r.nroPost + '</strong></td><td>' + r.filial + '</td><td>' + r.ciudad + '</td><td>' + r.nombre + '</td><td>' + r.cuit + '</td>'
       + '<td><span class="badge badge-' + (CLS[r.estado]||'propuesto') + '">' + r.estado + '</span></td><td>' + detalle + '</td></tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('tablaSeguimiento').innerHTML = h;
}

// ================== CONTRATADOS ==================
function renderContratados() {
  var datos = registros.filter(function(r){ return r.estado === 'Contratado'; });
  document.getElementById('contadorCont').innerText = datos.length + ' prestador/es contratado/s';
  var h = '<div class="tabla-wrapper"><table class="verde"><thead><tr><th>Fecha contratación</th><th>Filial</th><th>Localidad</th><th>Nombre</th><th>N° Postulación</th><th>CUIT</th><th>Nombre socio</th><th>Ticket</th></tr></thead><tbody>';
  datos.forEach(function(r) {
    var esNuevo = r.fechaContr === '10/06/2026' || r.fechaContr === '09/06/2026' || r.fechaContr === '06/06/2026';
    h += '<tr' + (esNuevo ? ' class="fila-recien" title="Contratado en los últimos 7 días"' : '') + '>'
       + '<td>' + r.fechaContr + '</td><td>' + r.filial + '</td><td>' + r.ciudad + '</td><td><strong>' + r.nombre + '</strong></td>'
       + '<td>' + r.nroPost + '</td><td>' + r.cuit + '</td><td>' + r.socio + '</td><td>' + r.ticket + '</td></tr>';
  });
  h += '</tbody></table></div>'
     + '<p style="font-size:12px;color:#666;margin-top:10px;">Las filas oscuras indican contrataciones de los últimos 7 días.</p>';
  document.getElementById('tablaContratados').innerHTML = h;
}

// ================== NO CONTRATADOS ==================
function renderNoContratados() {
  var datos = registros.filter(function(r){ return r.estado === 'No contratado'; });
  document.getElementById('contadorNoCont').innerText = datos.length + ' caso/s no contratado/s';
  var h = '<div class="tabla-wrapper"><table class="rojo"><thead><tr><th>Fecha</th><th>Filial</th><th>Localidad</th><th>Nombre</th><th>Especialidad</th><th>Nombre socio</th><th>Observaciones</th></tr></thead><tbody>';
  datos.forEach(function(r) {
    h += '<tr><td>' + r.fecha + '</td><td>' + r.filial + '</td><td>' + r.ciudad + '</td><td><strong>' + r.nombre + '</strong></td>'
       + '<td>' + r.esp + '</td><td>' + r.socio + '</td>'
       + '<td><button class="btn-obs" onclick="verObs(' + r.id + ')">💬 ' + r.obs.length + '</button></td></tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('tablaNoContratados').innerHTML = h;
}

// Inicial
renderGestion();
</script>
</body>
</html>
